steps:
  # State must live in GCS: each Cloud Build worker is a fresh filesystem; without a remote
  # backend, every run starts with empty state and tries to recreate fixed-name resources.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        BUCKET="$PROJECT_ID-terraform-state-lz"
        if ! gsutil ls -b "gs://$${BUCKET}" &>/dev/null; then
          gsutil mb -p "$PROJECT_ID" -l us-central1 "gs://$${BUCKET}"
        fi

  - name: 'hashicorp/terraform:1.6'
    entrypoint: '/bin/sh'
    args:
      - '-c'
      - |
        set -eu
        terraform init -input=false \
          -backend-config="bucket=$PROJECT_ID-terraform-state-lz" \
          -backend-config="prefix=terraform/development"
    dir: 'environments/development'

  - name: 'hashicorp/terraform:1.6'
    args:
      [
        'plan',
        '-input=false',
        '-var=project_id=$PROJECT_ID',
        '-var=db_password=$$DB_PASSWORD',
      ]
    dir: 'environments/development'
    secretEnv: ['DB_PASSWORD']

  - name: 'hashicorp/terraform:1.6'
    args:
      [
        'apply',
        '-input=false',
        '-auto-approve',
        '-var=project_id=$PROJECT_ID',
        '-var=db_password=$$DB_PASSWORD',
      ]
    dir: 'environments/development'
    secretEnv: ['DB_PASSWORD']

# Pull the db password from Secret Manager during the build
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/db-password/versions/latest
      env: 'DB_PASSWORD'

# options:
#   default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET
options:
  logging: CLOUD_LOGGING_ONLY