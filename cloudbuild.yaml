steps:
  #1. Create the GCS bucket if it doesn't exist
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        BUCKET="$PROJECT_ID-terraform-state-lz"
        if ! gsutil ls -b "gs://$${BUCKET}" &>/dev/null; then
          gsutil mb -p "$PROJECT_ID" -l us-central1 "gs://$${BUCKET}"
        fi

  #2. Initialize Terraform and dynamically inject the GCS bucket config
  - name: 'hashicorp/terraform:1.6'
    entrypoint: '/bin/sh'
    args:
      - '-c'
      - |
        set -eu
        terraform init -input=false \
          -backend-config="bucket=$PROJECT_ID-terraform-state-lz" \
          -backend-config="prefix=terraform/development"
    dir: 'environments/development'

  #3. Run Terraform Plan
  - name: 'hashicorp/terraform:1.6'
    args:
      [
        'plan',
        '-input=false',
        '-lock=false',
        '-var=project_id=$PROJECT_ID',
        '-var=db_password=$$DB_PASSWORD',
      ]
    dir: 'environments/development'
    secretEnv: ['DB_PASSWORD']

  #4. Run Terraform Apply
  - name: 'hashicorp/terraform:1.6'
    args:
      [
        'apply',
        '-input=false',
        '-auto-approve',
        '-lock=false',
        '-var=project_id=$PROJECT_ID',
        '-var=db_password=$$DB_PASSWORD',
      ]
    dir: 'environments/development'
    secretEnv: ['DB_PASSWORD']

# Pulling the database password securely from Secret Manager during the build
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/db-password/versions/latest
      env: 'DB_PASSWORD'

options:
  logging: CLOUD_LOGGING_ONLY